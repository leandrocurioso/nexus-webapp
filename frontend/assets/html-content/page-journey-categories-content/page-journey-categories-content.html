<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
    <h3 class="page-header"><span class="glyphicon glyphicon-info-sign" aria-hidden="true"></span> Categorias de Jornada</h3>

    <button type="button" id="btn-create-journey-category" data-show-update-block="false" data-modal-title="Criar Categoria de Jornada" class="btn btn-primary"><span class="glyphicon glyphicon-plus" aria-hidden="true"></span> Criar</button>
    <button type="button" id="btn-update-journey-category-table" class="btn btn-success"><span class="glyphicon glyphicon-refresh" aria-hidden="true"></span> Atualizar</button>

    <hr/>

    <div class="row">
      <div class="table-responsive">
        <table id="tb-journey-categories" class="table table-striped table-hover">
            <thead>
              <tr>
                  <th>Código</th>
                  <th>Categoria</th>
                  <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
        </table>
      </div>
    </div>

<!-- Modal Form-->
<div class="modal fade" id="form-create-journey-category-modal" tabindex="-1" role="dialog" aria-labelledby="form-create-journey-category-modal">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
        <h4 class="modal-title" id="form-create-journey-category-modal-label">Categoria de Jornada</h4>
      </div>

      <form id="form-create-journey-category">
        <div class="modal-body">
            <input type="hidden" id="hdn-journey-category-id">

            <div class="form-group">
              <div class="checkbox">
                  <label>
                  <input type="checkbox" id="chk-journey-category-active" checked type="checkbox"> <strong>Ativo?</strong>
                  </label>
              </div>
            </div>

            <div class="form-group">
                <label for="txt-journey-category-name">Nome da Categoria</label>
                <input type="text" class="form-control" id="txt-journey-category-name" placeholder="Digite o nome da categoria de jornada">
            </div>

            <div class="form-group">
              <label for="txt-journey-category-description">Descrição</label>
              <textarea id="txt-journey-category-description" rows="6" placeholder="Digite a descrição" class="form-control"></textarea>
            </div>

            <div class="form-group journey-category-update-section">
                <label for="txt-journey-category-created-at">Criado em</label>
                <input type="text" class="form-control" id="txt-journey-category-created-at" disabled>
            </div>

            <div class="form-group journey-category-update-section">
                <label for="txt-journey-category-updated-at">Atualizado em</label>
                <input type="text" class="form-control" id="txt-journey-category-updated-at" disabled>
            </div>

        </div>

        <div class="modal-footer">
          <button type="button" id="btn-journey-category-clear-form" class="btn btn-warning"><span class="glyphicon glyphicon-erase" aria-hidden="true"></span> Limpar</button>
          <button type="button" class="btn btn-default" data-dismiss="modal"><span class="glyphicon glyphicon-circle-arrow-up" aria-hidden="true"></span> Fechar</button>
          <button type="submit" class="btn btn-primary"><span class="glyphicon glyphicon-save" aria-hidden="true"></span> Salvar</button>
        </div>
      </form>

    </div>
  </div>
</div>

</div>
